<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Laptop Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <div class="logo">ExaTech</div>
    <ul class="nav">
      <li>Home</li>
      <li>Products</li>
      <li>Cart</li>
      <li>Login</li>
      <li>Contact</li>
    </ul>
  </header>

  <!-- BANNER -->
  <section class="hero-banner">
    <div class="overlay">
      <h1>Best Laptops in One Place</h1>
      <p>Deal • Quality • Service</p>
      <a href="#products" class="btn">Shop Now</a>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section id="products" class="products">

    <div class="card">
      <img src="images/laptop1.jpeg" alt="">
      <h3>Dell Inspiron</h3>
      <p>₹55,000</p>
    </div>

    <div class="card">
      <img src="images/laptop2.jpeg" alt="">
      <h3>HP Pavilion</h3>
      <p>₹60,000</p>
    </div>

    <div class="card">
      <img src="images/laptop3.jpeg" alt="">
      <h3>Lenovo IdeaPad</h3>
      <p>₹50,000</p>
    </div>

  </section>

</body>
</html>
